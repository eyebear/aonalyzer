name: aonalyzer

services:
  aonalyzer-postgres:
    image: pgvector/pgvector:pg16
    container_name: aonalyzer-postgres
    environment:
      POSTGRES_DB: aonalyzer
      POSTGRES_USER: aonalyzer
      POSTGRES_PASSWORD: aonalyzer_password
    ports:
      - "5434:5432"
    volumes:
      - aonalyzer_postgres_data:/var/lib/postgresql/data
    networks:
      - aonalyzer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aonalyzer -d aonalyzer"]
      interval: 10s
      timeout: 5s
      retries: 5

  aonalyzer-redis:
    image: redis:7.4-alpine
    container_name: aonalyzer-redis
    ports:
      - "6379:6379"
    volumes:
      - aonalyzer_redis_data:/data
    networks:
      - aonalyzer-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  aonalyzer-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: aonalyzer-api
    # .env is a local-development override only; every required value has an
    # explicit default below so `docker compose config` stays valid without it.
    env_file:
      - path: .env
        required: false
    environment:
      APP_NAME: "Aonalyzer"
      APP_TECHNICAL_NAME: "aonalyzer"
      APP_ENV: "docker"
      APP_DEBUG: "true"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      POSTGRES_HOST: "aonalyzer-postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "aonalyzer"
      POSTGRES_USER: "aonalyzer"
      POSTGRES_PASSWORD: "aonalyzer_password"
      DATABASE_URL: "postgresql+psycopg://aonalyzer:aonalyzer_password@aonalyzer-postgres:5432/aonalyzer"
      REDIS_HOST: "aonalyzer-redis"
      REDIS_PORT: "6379"
      REDIS_URL: "redis://aonalyzer-redis:6379/0"
      ACTIVE_AI_PROVIDER: "DISABLED"
      FALLBACK_AI_PROVIDER: "DISABLED"
      DEFAULT_STRATEGY_PROFILE: "Balanced Research Default"
    ports:
      - "8000:8000"
    # Apply migrations before serving so the schema is migration-driven, not
    # dependent on lazy runtime table creation. ``upgrade head`` is idempotent.
    command: sh -c "alembic upgrade head && uvicorn app.api.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
      - aonalyzer_exports:/app/exports
      - aonalyzer_models:/app/models
      - aonalyzer_reports:/app/reports
    depends_on:
      aonalyzer-postgres:
        condition: service_healthy
      aonalyzer-redis:
        condition: service_healthy
    networks:
      - aonalyzer-network

  aonalyzer-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: aonalyzer-agent
    env_file:
      - path: .env
        required: false
    environment:
      APP_NAME: "Aonalyzer"
      APP_TECHNICAL_NAME: "aonalyzer"
      APP_ENV: "docker"
      APP_DEBUG: "true"
      POSTGRES_HOST: "aonalyzer-postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "aonalyzer"
      POSTGRES_USER: "aonalyzer"
      POSTGRES_PASSWORD: "aonalyzer_password"
      DATABASE_URL: "postgresql+psycopg://aonalyzer:aonalyzer_password@aonalyzer-postgres:5432/aonalyzer"
      REDIS_HOST: "aonalyzer-redis"
      REDIS_PORT: "6379"
      REDIS_URL: "redis://aonalyzer-redis:6379/0"
      ACTIVE_AI_PROVIDER: "DISABLED"
      FALLBACK_AI_PROVIDER: "DISABLED"
      DEFAULT_STRATEGY_PROFILE: "Balanced Research Default"
    volumes:
      - .:/app
      - aonalyzer_exports:/app/exports
      - aonalyzer_models:/app/models
      - aonalyzer_reports:/app/reports
    depends_on:
      aonalyzer-postgres:
        condition: service_healthy
      aonalyzer-redis:
        condition: service_healthy
    networks:
      - aonalyzer-network

  aonalyzer-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: aonalyzer-dashboard
    environment:
      APP_NAME: "Aonalyzer"
      APP_TECHNICAL_NAME: "aonalyzer"
      APP_ENV: "docker"
      APP_DEBUG: "true"
      DASHBOARD_HOST: "0.0.0.0"
      DASHBOARD_PORT: "8501"
      API_BASE_URL: "http://aonalyzer-api:8000"
      DEFAULT_STRATEGY_PROFILE: "Balanced Research Default"
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - aonalyzer_exports:/app/exports
      - aonalyzer_models:/app/models
      - aonalyzer_reports:/app/reports
    depends_on:
      - aonalyzer-api
    networks:
      - aonalyzer-network

  aonalyzer-ollama:
    image: ollama/ollama:latest
    container_name: aonalyzer-ollama
    profiles:
      - llm
    ports:
      - "11434:11434"
    volumes:
      - aonalyzer_ollama_data:/root/.ollama
    networks:
      - aonalyzer-network

networks:
  aonalyzer-network:
    name: aonalyzer-network
    driver: bridge

volumes:
  aonalyzer_postgres_data:
  aonalyzer_redis_data:
  aonalyzer_ollama_data:
  aonalyzer_exports:
  aonalyzer_models:
  aonalyzer_reports: